<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Video Uploader Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
    
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; background: #f8f9fa; color: #333;
            transition: background-color 0.3s;
        }
        .container { 
            width: 85%; max-width: 400px; background: white; padding: 25px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            z-index: 10;
        }
        h2 { margin-top: 0; font-size: 1.3rem; color: #007aff; text-align: center; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        select, button { width: 100%; padding: 14px; font-size: 16px; border-radius: 12px; border: 1px solid #ddd; appearance: none; }
        select { background-color: #fff; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 12px auto; }
        button { background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,122,255,0.2); }
        button:active { transform: scale(0.98); background: #0056b3; }
        button:disabled { background: #ccc; box-shadow: none; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #888; text-align: center; min-height: 2.5em; line-height: 1.4; }
        
        /* 究極の暗転オーバーレイ */
        #overlay {
            display: none; 
            position: fixed; 
            /* 画面外まで広げて隙間を完全に埋める */
            top: -100px; left: -100px; right: -100px; bottom: -100px;
            width: 200vw; height: 200vh;
            background: black; 
            z-index: 99999; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Video Uploader Pro</h2>
        
        <div class="field">
            <label>📷 カメラ選択</label>
            <select id="cameraSelect">
                <option value="environment">背面カメラ (Outer)</option>
                <option value="user">前面カメラ (Inner)</option>
            </select>
        </div>

        <div class="field">
            <label>⏱ 録画時間 (1分ごとに自動送信)</label>
            <select id="durationSelect">
                <option value="1">1分間</option>
                <option value="3">3分間</option>
                <option value="5">5分間</option>
                <option value="10">10分間</option>
            </select>
        </div>

        <button id="startBtn">録画を開始する</button>
        <div id="status">システム待機中</div>
    </div>

    <div id="overlay"></div>

    <script>
        // --- 1. Supabase設定 ---
        // 注意: 末尾にスラッシュ(/)や /rest/v1 を入れないこと
        const SUPABASE_URL = 'https://bbxtesuqsqwdokangvrj.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Gg5g6_Ey4i64-uJ7579NiQ_2Q_uI9C8';
        
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            document.getElementById('status').innerText = "接続初期化エラー";
        }

        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');

        let mediaRecorder;
        let stream;
        let isRecording = false;

        // --- 2. アップロード処理 ---
        async function uploadToSupabase(blob) {
            const timestamp = Date.now();
            const fileName = `vid_${timestamp}.mp4`;
            
            try {
                const { data, error } = await supabaseClient.storage
                    .from('video') // バケット名は 'video'
                    .upload(fileName, blob, {
                        contentType: 'video/mp4',
                        upsert: false
                    });

                if (error) {
                    status.innerText = "送信エラー: " + error.message;
                } else {
                    status.innerText = "最新の送信成功: " + fileName;
                }
            } catch (err) {
                status.innerText = "通信トラブル";
            }
        }

        // --- 3. 録画メインロジック ---
        async function runRecordingSession() {
            const cameraMode = document.getElementById('cameraSelect').value;
            const totalMinutes = parseInt(document.getElementById('durationSelect').value);
            let elapsedMinutes = 0;

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: cameraMode },
                    audio: true
                });

                // UIの暗転開始
                isRecording = true;
                overlay.style.display = 'block';
                document.body.style.backgroundColor = "black";
                startBtn.disabled = true;

                const startMinuteLoop = () => {
                    if (elapsedMinutes >= totalMinutes || !isRecording) {
                        finishSession();
                        return;
                    }

                    const chunks = [];
                    mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                        uploadToSupabase(videoBlob);
                    };

                    mediaRecorder.start();
                    
                    // 1分(60000ms)後に区切る
                    setTimeout(() => {
                        if (isRecording) {
                            mediaRecorder.stop();
                            elapsedMinutes++;
                            startMinuteLoop();
                        }
                    }, 60000); 
                };

                startMinuteLoop();

            } catch (err) {
                status.innerText = "カメラ起動失敗: " + err.message;
                finishSession();
            }
        }

        function finishSession() {
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (stream) stream.getTracks().forEach(track => track.stop());
            
            overlay.style.display = 'none';
            document.body.style.backgroundColor = "#f8f9fa";
            startBtn.disabled = false;
            status.innerText = "セッション終了";
        }

        startBtn.addEventListener('click', () => {
            status.innerText = "準備中...";
            runRecordingSession();
        });
    </script>
</body>
</html>
